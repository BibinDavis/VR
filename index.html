<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupfie AR | Image to YouTube</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        #scanning-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            color: white;
            pointer-events: none;
        }
        .scan-frame {
            width: 250px;
            height: 250px;
            border: 2px solid #00f2ff;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 0 20px #00f2ff;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        #start-button, #close-video-btn {
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="scanning-overlay">
        <div id="start-screen" class="text-center p-6 bg-slate-900/80 rounded-3xl backdrop-blur-md pointer-events-auto">
            <h1 class="text-2xl font-black mb-2 text-cyan-400 uppercase tracking-widest">AR Video Scanner</h1>
            <p class="text-sm text-slate-300 mb-6">Experience photos coming to life.</p>
            <button id="start-button" class="bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-bold py-3 px-8 rounded-full transition-all active:scale-95 shadow-lg shadow-cyan-500/20">
                START EXPERIENCE
            </button>
        </div>

        <div id="scanner-ui" class="hidden flex flex-col items-center">
            <div class="scan-frame">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-cyan-500 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">
                    Scan Target Image
                </div>
            </div>
            <p class="mt-6 font-bold text-sm text-cyan-400 tracking-wide uppercase drop-shadow-md">Searching for target...</p>
        </div>

        <div id="youtube-modal" class="hidden fixed inset-0 z-20 flex flex-col items-center justify-center bg-black/85 p-4 pointer-events-auto">
            <div class="w-full max-w-3xl aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl border border-slate-800 relative">
                <iframe 
                    id="yt-player" 
                    class="w-full h-full" 
                    src="https://www.youtube.com/embed/x0WAMDjWL8k?enablejsapi=1&autoplay=1" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            </div>
            <button id="close-video-btn" class="mt-6 bg-rose-500 hover:bg-rose-400 text-white font-bold py-2 px-6 rounded-full transition-all text-xs tracking-wider uppercase shadow-md">
                Minimize & Rescan
            </button>
        </div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            </a-entity>
    </a-scene>

    <script>
        const startButton = document.getElementById('start-button');
        const startScreen = document.getElementById('start-screen');
        const scannerUI = document.getElementById('scanner-ui');
        const sceneEl = document.querySelector('a-scene');
        
        const targetEntity = document.getElementById('target');
        const ytModal = document.getElementById('youtube-modal');
        const ytPlayer = document.getElementById('yt-player');
        const closeBtn = document.getElementById('close-video-btn');

        // Cache original YouTube source configuration string
        const baseVideoSrc = ytPlayer.src;

        // 1. Initialize Web Camera Stream via UI Click
        startButton.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            scannerUI.classList.remove('hidden');
            sceneEl.systems['mindar-image-system'].start();
        });

        // 2. Event: Target Tracked Successfully
        targetEntity.addEventListener("targetFound", event => {
            console.log("Image Target Found!");
            scannerUI.classList.add('hidden');
            
            // Re-apply original URL to prompt native autoplay triggers
            ytPlayer.src = baseVideoSrc;
            ytModal.classList.remove('hidden');
        });

        // 3. Event: Target Tracking Dropped
        targetEntity.addEventListener("targetLost", event => {
            console.log("Image Target Lost.");
            // Keep modal visible so users can finish watching if they move away from the printout
        });

        // 4. Close/Dismiss video manually to resume camera scanning loop
        closeBtn.addEventListener('click', () => {
            ytModal.classList.add('hidden');
            scannerUI.classList.remove('hidden');
            
            // Hard kill the iframe content source string to immediately kill stream audio/video buffers
            ytPlayer.src = ""; 
        });
    </script>
</body>
</html>
